version: '3.8'

services:
  home-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/home_menu.db
      - API_KEY=homeapi_default_key_2024
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
